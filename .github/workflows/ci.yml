name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build-push:
    # macOS M칩 환경의 label(태그)을 정확히 명시하도록 수정합니다.
    runs-on: [self-hosted, macOS, ARM64]

    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker Hub 로그인 (GitHub Secrets 사용)
      # 로컬 Docker Desktop의 인증 세션 만료로 인한 패키지 Pull 에러를 막기 위해 Buildx 세팅보다 앞서 실행합니다.
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 3. Docker 빌드 캐시 등을 위해 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. Docker 이미지 빌드 및 Docker Hub로 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 레포 이름은 Docker Hub 아이디와 프로젝트 명 조합
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:latest
          # 레이어 캐싱을 통해 이후 빌드 속도 획기적 단축
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:buildcache,mode=max

      # 5. 로컬 워크스페이스(Self-hosted Runner)에 컨테이너 자동 배포 (Continuous Deployment)
      - name: Deploy to Local Mac Server
        run: |
          # 1. 방금 Docker Hub에 Push된 최신 이미지를 가져옵니다.
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:latest
          
          # 2. 현재 실행 중인 동일한 이름의 컨테이너가 있다면 중지 및 삭제합니다.
          # (처음 실행 시 에러가 나면 무시하도록 || true 처리)
          docker stop age-predictor || true
          docker rm age-predictor || true
          
          # 3. 최신 이미지로 백그라운드(-d)에서 API 서버를 재실행합니다.
          docker run -d -p 8000:8000 --name age-predictor ${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:latest

name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - master

jobs:
  docker-build-push:
    # ubuntu-latest 대신 로컬에 설치된 self-hosted runner가 작업을 가져갈 수 있도록 변경합니다.
    runs-on: self-hosted

    steps:
      # 1. 레포지토리 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Docker 빌드 캐시 등을 위해 Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (GitHub Secrets 사용)
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Docker 이미지 빌드 및 Docker Hub로 푸시
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # 레포 이름은 Docker Hub 아이디와 프로젝트 명 조합
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:latest
          # 레이어 캐싱을 통해 이후 빌드 속도 획기적 단축
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:buildcache
          cache-to: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/age-predictor-api:buildcache,mode=max

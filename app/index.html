<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Age Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-grad-1: #0f172a;
            --bg-grad-2: #1e1b4b;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-color: #f8fafc;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
        }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2));
            color: var(--text-color);
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 2rem;
            margin: 1rem;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(to right, #a78bfa, #f472b6);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: #cbd5e1;
            font-weight: 300;
            margin-bottom: 2rem;
        }

        .upload-area {
            border: 2px dashed var(--glass-border);
            border-radius: 16px;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            background: rgba(0,0,0,0.2);
            margin-bottom: 1.5rem;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: var(--accent);
            background: rgba(139, 92, 246, 0.1);
        }

        .upload-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            display: block;
        }

        input[type="file"] {
            display: none;
        }

        #preview-container {
            display: none;
            margin-bottom: 1.5rem;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
            max-height: 300px;
        }

        #preview-image {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 1rem 2rem;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 12px;
            width: 100%;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }

        .btn:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn:disabled {
            background: #475569;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.7;
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 12px;
            background: rgba(0, 255, 128, 0.1);
            border: 1px solid rgba(0, 255, 128, 0.2);
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .result-box h2 {
            margin: 0;
            color: #34d399;
            font-size: 2.5rem;
            font-weight: 800;
        }

        .result-box p {
            margin: 0.5rem 0 0 0;
            color: #a7f3d0;
            font-size: 1rem;
        }

        /* Spinner */
        .spinner {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            margin: 0 auto;
        }

        .btn.loading span {
            display: none;
        }
        .btn.loading .spinner {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes popIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AI Age Predictor</h1>
        <p class="subtitle">Upload a face, discover the age magic.</p>

        <label for="image-upload" class="upload-area" id="drop-zone">
            <span class="upload-icon">📸</span>
            <span id="upload-text">Click to browse or drag & drop</span>
            <input type="file" id="image-upload" accept="image/*">
        </label>

        <div id="preview-container">
            <img id="preview-image" src="" alt="Preview">
        </div>

        <button id="predict-btn" class="btn" disabled>
            <span>Predict Age</span>
            <div class="spinner"></div>
        </button>

        <div id="result-box" class="result-box">
            <h2><span id="age-result">25</span> YO</h2>
            <p>Estimated by DeepFace AI</p>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('image-upload');
        const previewContainer = document.getElementById('preview-container');
        const previewImage = document.getElementById('preview-image');
        const predictBtn = document.getElementById('predict-btn');
        const uploadText = document.getElementById('upload-text');
        const resultBox = document.getElementById('result-box');
        const ageResult = document.getElementById('age-result');

        let selectedFile = null;

        // Handle Drag & Drop
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });

        function preventDefaults(e) {
            e.preventDefault();
            e.stopPropagation();
        }

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });

        dropZone.addEventListener('drop', (e) => {
            let dt = e.dataTransfer;
            let files = dt.files;
            handleFiles(files);
        });

        fileInput.addEventListener('change', function() {
            handleFiles(this.files);
        });

        function handleFiles(files) {
            if (files.length > 0) {
                const file = files[0];
                if (file.type.startsWith('image/')) {
                    selectedFile = file;
                    // Show preview
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        previewImage.src = e.target.result;
                        previewContainer.style.display = 'block';
                        dropZone.style.display = 'none';
                        predictBtn.disabled = false;
                        resultBox.style.display = 'none';
                    }
                    reader.readAsDataURL(file);
                } else {
                    alert('Please upload an image file.');
                }
            }
        }

        predictBtn.addEventListener('click', async () => {
            if (!selectedFile) return;

            // UI Loading state
            predictBtn.classList.add('loading');
            predictBtn.disabled = true;
            resultBox.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict/age', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to predict age');
                }

                if (data.prediction && data.prediction.length > 0) {
                    ageResult.innerText = data.prediction[0].age;
                    resultBox.style.display = 'block';
                    
                    // Reset upload area so user can upload again easily
                    setTimeout(() => {
                        dropZone.style.display = 'block';
                        previewContainer.style.display = 'none';
                        selectedFile = null;
                        uploadText.innerText = "Upload another photo";
                    }, 3000);
                } else {
                    throw new Error("No face detected in the image.");
                }
            } catch (error) {
                alert("Error: " + error.message);
            } finally {
                predictBtn.classList.remove('loading');
                if(!selectedFile) predictBtn.disabled = true;
                else predictBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
